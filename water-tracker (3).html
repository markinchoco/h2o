<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hydration log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --bg-secondary: #f2f1ec;
      --bg-tertiary: #e8e7e1;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b65;
      --text-tertiary: #9e9e98;
      --border-light: rgba(26,26,24,0.1);
      --border-mid: rgba(26,26,24,0.2);
      --border-strong: rgba(26,26,24,0.35);
      --accent: #1a1a18;
      --water-fill: rgba(26,26,24,0.12);
      --water-fill-2: rgba(26,26,24,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 20px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg-secondary: #242422;
        --bg-tertiary: #2e2e2b;
        --text-primary: #f0efe8;
        --text-secondary: #9e9d96;
        --text-tertiary: #6b6a64;
        --border-light: rgba(240,239,232,0.08);
        --border-mid: rgba(240,239,232,0.15);
        --border-strong: rgba(240,239,232,0.28);
        --accent: #f0efe8;
        --water-fill: rgba(240,239,232,0.1);
        --water-fill-2: rgba(240,239,232,0.18);
      }
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Mono', 'Courier New', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 5rem;
    }

    .tracker {
      width: 100%;
      max-width: 460px;
    }

    /* ── header ── */
    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 300;
      font-size: 32px;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      line-height: 1.1;
    }

    header p {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    /* ── glass ── */
    .glass-wrap {
      display: flex;
      justify-content: center;
      margin: 0 0 1.5rem;
    }

    .glass-inner {
      position: relative;
      width: 110px;
      height: 175px;
    }

    .glass-inner svg {
      width: 100%;
      height: 100%;
    }

    .pct-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 20px;
      color: var(--text-primary);
      pointer-events: none;
    }

    /* ── progress bar ── */
    .progress-wrap {
      height: 3px;
      background: var(--border-light);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    /* ── stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 2rem;
    }

    .stat {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 14px 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .stat-unit {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-left: 2px;
    }

    /* ── goal row ── */
    .goal-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      margin-bottom: 1.75rem;
    }

    .goal-row label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .goal-input {
      flex: 1;
      min-width: 0;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      outline: none;
    }

    .goal-unit {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .set-btn {
      padding: 6px 14px;
      background: transparent;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .set-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--border-strong);
    }

    /* ── add intake ── */
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ml-input {
      flex: 1;
      height: 46px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      padding: 0 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    .ml-input:focus {
      border-color: var(--border-strong);
    }

    .ml-input::placeholder {
      color: var(--text-tertiary);
    }

    /* hide number spinners */
    .ml-input::-webkit-inner-spin-button,
    .ml-input::-webkit-outer-spin-button,
    .goal-input::-webkit-inner-spin-button,
    .goal-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .ml-input, .goal-input { -moz-appearance: textfield; }

    .add-btn {
      height: 46px;
      padding: 0 22px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover { opacity: 0.75; }
    .add-btn:active { transform: scale(0.98); }

    /* ── quick add ── */
    .quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .quick-btn {
      padding: 8px 16px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-secondary);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-color: var(--border-strong);
    }

    .quick-btn:active { transform: scale(0.97); }

    /* ── log ── */
    .log-section { margin-bottom: 1.5rem; }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }

    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 16px;
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      background: var(--bg);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-time  { font-size: 11px; color: var(--text-tertiary); }
    .log-amt   { font-size: 14px; font-weight: 500; color: var(--text-primary); }

    .log-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 18px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }

    .log-del:hover { color: #c0392b; }

    .empty-log {
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
      padding: 2rem 0;
      font-style: italic;
    }

    /* ── reset ── */
    .reset-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      color: var(--text-tertiary);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }

    .reset-btn:hover {
      border-color: var(--border-mid);
      color: var(--text-secondary);
      background: var(--bg-secondary);
    }

    /* ── sound toggle ── */
    .sound-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-mid);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      z-index: 100;
    }

    .sound-toggle:hover {
      background: var(--bg-tertiary);
      border-color: var(--border-strong);
    }

    .sound-toggle svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: var(--text-secondary);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sound-toggle.muted svg { stroke: var(--text-tertiary); }

    /* ── toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--accent);
      color: var(--bg);
      padding: 11px 22px;
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.03em;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ── responsive ── */
    @media (max-width: 400px) {
      body { padding: 2rem 1rem 4rem; }
      header h1 { font-size: 26px; }
      .stats-row { gap: 8px; }
      .stat-num { font-size: 17px; }
    }
  </style>
</head>
<body>

<!-- sound toggle -->
<button class="sound-toggle" id="sound-toggle" title="toggle sound" onclick="toggleSound()">
  <svg id="sound-icon" viewBox="0 0 24 24">
    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
    <path id="wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    <path id="wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
  </svg>
</button>

<div class="tracker">

  <header>
    <h1>hydration log</h1>
    <p id="date-label"></p>
  </header>

  <div class="glass-wrap">
    <div class="glass-inner">
      <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="glassClip">
            <path d="M12,10 L88,10 L80,150 L20,150 Z"/>
          </clipPath>
        </defs>
        <rect id="wfill1" x="0" y="150" width="100" height="0"
              clip-path="url(#glassClip)"
              style="fill: var(--water-fill); transition: y 0.5s cubic-bezier(.34,1.2,.64,1), height 0.5s cubic-bezier(.34,1.2,.64,1);"/>
        <rect id="wfill2" x="0" y="150" width="100" height="0"
              clip-path="url(#glassClip)"
              style="fill: var(--water-fill-2); transition: y 0.5s cubic-bezier(.34,1.2,.64,1), height 0.5s cubic-bezier(.34,1.2,.64,1);"/>
        <path d="M12,10 L88,10 L80,150 L20,150 Z"
              fill="none"
              stroke="var(--border-mid)"
              stroke-width="1.5"
              stroke-linejoin="round"/>
      </svg>
      <div class="pct-label" id="pct-label">0%</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">consumed</div>
      <div class="stat-num" id="stat-consumed">0<span class="stat-unit">ml</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">remaining</div>
      <div class="stat-num" id="stat-remaining">—<span class="stat-unit">ml</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">goal</div>
      <div class="stat-num" id="stat-goal">2000<span class="stat-unit">ml</span></div>
    </div>
  </div>

  <div class="goal-row">
    <label for="goal-input">daily goal</label>
    <input class="goal-input" id="goal-input" type="number" value="2000" min="100" max="20000" />
    <span class="goal-unit">ml</span>
    <button class="set-btn" onclick="setGoal()">set</button>
  </div>

  <div class="section-label">add intake</div>
  <div class="input-row">
    <input class="ml-input" id="ml-input" type="number" placeholder="amount in ml" min="1" max="5000" />
    <button class="add-btn" id="add-btn">+ add</button>
  </div>

  <div class="quick-btns">
    <button class="quick-btn" onclick="quickAdd(150)">150 ml</button>
    <button class="quick-btn" onclick="quickAdd(250)">250 ml</button>
    <button class="quick-btn" onclick="quickAdd(330)">330 ml</button>
    <button class="quick-btn" onclick="quickAdd(500)">500 ml</button>
    <button class="quick-btn" onclick="quickAdd(750)">750 ml</button>
    <button class="quick-btn" onclick="quickAdd(1000)">1000 ml</button>
  </div>

  <div class="log-section">
    <div class="section-label">today's log</div>
    <div class="log-list" id="log-list"></div>
  </div>

  <button class="reset-btn" onclick="resetDay()">reset today</button>

</div>

<div class="toast" id="toast"></div>

<script>
  /* ── sound engine ── */
  let audioCtx = null;
  let soundOn  = localStorage.getItem('hydra_sound') !== 'off';

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function toggleSound() {
    soundOn = !soundOn;
    localStorage.setItem('hydra_sound', soundOn ? 'on' : 'off');
    updateSoundIcon();
    if (soundOn) { getCtx(); playDrop(); }
  }

  function updateSoundIcon() {
    const btn = document.getElementById('sound-toggle');
    const w1  = document.getElementById('wave1');
    const w2  = document.getElementById('wave2');
    btn.classList.toggle('muted', !soundOn);
    w1.style.display = soundOn ? '' : 'none';
    w2.style.display = soundOn ? '' : 'none';
  }

  /* soft sine tone with envelope */
  function playTone(freq, startTime, duration, gainPeak, ctx) {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    const filt = ctx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, startTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.98, startTime + duration);

    filt.type            = 'lowpass';
    filt.frequency.value = 1800;
    filt.Q.value         = 0.7;

    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

    osc.connect(filt);
    filt.connect(gain);
    gain.connect(ctx.destination);

    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
  }

  /* subtle harmonic shimmer layer */
  function playShimmer(freq, startTime, ctx) {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq * 2, startTime);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.04, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.35);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + 0.4);
  }

  /* water-drop jingle: soft descending pentatonic drip */
  function playDrop() {
    if (!soundOn) return;
    const ctx = getCtx();
    const t   = ctx.currentTime + 0.01;

    const notes = [523.25, 440, 392, 329.63]; /* C5 A4 G4 E4 — gentle pentatonic fall */
    const gaps  = [0, 0.10, 0.19, 0.30];
    const gains = [0.22, 0.17, 0.14, 0.18];
    const durs  = [0.38, 0.32, 0.28, 0.55];

    notes.forEach((freq, i) => {
      playTone(freq, t + gaps[i], durs[i], gains[i], ctx);
      playShimmer(freq, t + gaps[i], ctx);
    });
  }

  /* goal-reached bloom: warm ascending chord */
  function playGoalChime() {
    if (!soundOn) return;
    const ctx = getCtx();
    const t   = ctx.currentTime + 0.01;

    /* Cmaj7 arpeggio: C E G B */
    const chord = [261.63, 329.63, 392, 493.88, 523.25];
    chord.forEach((freq, i) => {
      playTone(freq, t + i * 0.08, 1.4 - i * 0.1, 0.18, ctx);
      playShimmer(freq, t + i * 0.08, ctx);
    });
  }

  updateSoundIcon();

  /* ── storage key helpers ── */
  const TODAY_KEY = () => 'hydra_' + new Date().toISOString().slice(0, 10);
  const GOAL_KEY  = 'hydra_goal';

  /* ── state ── */
  let goal    = parseInt(localStorage.getItem(GOAL_KEY) || '2000', 10);
  let entries = [];  /* [{ id, amount, time }] */

  /* ── init ── */
  (function init() {
    loadDay();
    renderDate();
    renderUI();
    renderLog();

    document.getElementById('goal-input').value = goal;

    document.getElementById('add-btn').addEventListener('click', addWater);
    document.getElementById('ml-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addWater();
    });

    /* auto-reset if the stored date differs from today */
    const stored = localStorage.getItem('hydra_last_date');
    const today  = new Date().toISOString().slice(0, 10);
    if (stored && stored !== today) {
      entries  = [];
      saveDay();
    }
    localStorage.setItem('hydra_last_date', today);
  })();

  /* ── persistence ── */
  function loadDay() {
    const raw = localStorage.getItem(TODAY_KEY());
    entries   = raw ? JSON.parse(raw) : [];
  }

  function saveDay() {
    localStorage.setItem(TODAY_KEY(), JSON.stringify(entries));
  }

  /* ── goal ── */
  function setGoal() {
    const v = parseInt(document.getElementById('goal-input').value, 10);
    if (!v || v < 100) { toast('enter a valid goal (min 100 ml)'); return; }
    goal = v;
    localStorage.setItem(GOAL_KEY, goal);
    renderUI();
    toast('goal updated to ' + goal + ' ml');
  }

  /* ── add water ── */
  function addWater() {
    const input = document.getElementById('ml-input');
    const v     = parseInt(input.value, 10);
    if (!v || v <= 0) { toast('enter an amount in ml'); return; }
    if (v > 5000)     { toast('that seems too much at once!'); return; }
    input.value = '';
    input.focus();
    log(v);
  }

  function quickAdd(v) { log(v); }

  function log(v) {
    const entry = {
      id:     Date.now(),
      amount: v,
      time:   new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    };
    entries.unshift(entry);
    saveDay();
    renderUI();
    renderLog();

    const consumed = totalConsumed();
    if (consumed >= goal) {
      playGoalChime();
      toast('goal reached! great work 💧');
    } else {
      playDrop();
      toast('+' + v + ' ml added');
    }
  }

  function removeEntry(id) {
    entries = entries.filter(e => e.id !== id);
    saveDay();
    renderUI();
    renderLog();
  }

  function totalConsumed() {
    return entries.reduce((s, e) => s + e.amount, 0);
  }

  /* ── reset ── */
  function resetDay() {
    if (!confirm("Reset today's log? This cannot be undone.")) return;
    entries = [];
    saveDay();
    renderUI();
    renderLog();
    toast('day reset');
  }

  /* ── render ── */
  function renderDate() {
    document.getElementById('date-label').textContent =
      new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function renderUI() {
    const consumed = totalConsumed();
    const pct      = Math.min(100, Math.round((consumed / goal) * 100));
    const rem      = Math.max(0, goal - consumed);

    document.getElementById('pct-label').textContent      = pct + '%';
    document.getElementById('stat-consumed').innerHTML    = consumed + '<span class="stat-unit">ml</span>';
    document.getElementById('stat-remaining').innerHTML   = rem + '<span class="stat-unit">ml</span>';
    document.getElementById('stat-goal').innerHTML        = goal + '<span class="stat-unit">ml</span>';
    document.getElementById('progress-fill').style.width  = pct + '%';

    /* glass fill */
    const fillRatio  = pct / 100;
    const glassTop   = 10, glassBottom = 150;
    const glassH     = glassBottom - glassTop;
    const waterTop   = glassBottom - fillRatio * glassH;
    const waterH     = fillRatio * glassH;

    const f1 = document.getElementById('wfill1');
    const f2 = document.getElementById('wfill2');
    f1.setAttribute('y',      waterTop - 5);
    f1.setAttribute('height', waterH  + 5);
    f2.setAttribute('y',      waterTop);
    f2.setAttribute('height', waterH);
  }

  function renderLog() {
    const list = document.getElementById('log-list');
    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-log">no entries yet</div>';
      return;
    }
    list.innerHTML = entries.map(e => `
      <div class="log-item">
        <span class="log-time">${e.time}</span>
        <span class="log-amt">${e.amount} ml</span>
        <button class="log-del" onclick="removeEntry(${e.id})" title="remove">×</button>
      </div>
    `).join('');
  }

  /* ── toast ── */
  let _toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }
</script>

</body>
</html>
